  <text x="130" y="290" font-family="Georgia,serif" font-size="72" font-weight="bold" fill="#6b1e07">Salt Lake Chamber</text>
  <text x="130" y="370" font-family="Arial,sans-serif" font-size="44" fill="#4a3028">Business Directory</text>
