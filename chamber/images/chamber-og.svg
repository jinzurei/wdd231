    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6b1e07"/>
      <stop offset="100%" stop-color="#b83018"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Mountain shape -->
  <polygon points="600,80 900,420 300,420" fill="#ffd3ac" opacity="0.2"/>
  <polygon points="600,80 680,220 520,220" fill="#ffffff" opacity="0.3"/>
