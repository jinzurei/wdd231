<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-label="Salt Lake City skyline with Wasatch Mountains">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="60%" stop-color="#c0583a"/>
      <stop offset="100%" stop-color="#e8a06a"/>
    </linearGradient>
    <linearGradient id="mtn1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2040"/>
      <stop offset="100%" stop-color="#3c2e5a"/>
    </linearGradient>
    <linearGradient id="mtn2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a3568"/>
      <stop offset="100%" stop-color="#5c4478"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1220"/>
      <stop offset="100%" stop-color="#0e0a14"/>
    </linearGradient>
    <linearGradient id="bldgA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e1e10"/>
      <stop offset="100%" stop-color="#1a0e09"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="480" fill="url(#sky)"/>

  <!-- Stars -->
  <circle cx="120" cy="40" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="250" cy="25" r="1" fill="white" opacity="0.7"/>
  <circle cx="380" cy="55" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="500" cy="20" r="1" fill="white" opacity="0.9"/>
  <circle cx="700" cy="35" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="850" cy="18" r="1" fill="white" opacity="0.8"/>
  <circle cx="980" cy="45" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="1100" cy="28" r="1" fill="white" opacity="0.9"/>
  <circle cx="60"  cy="70" r="1"   fill="white" opacity="0.5"/>
  <circle cx="460" cy="70" r="1"   fill="white" opacity="0.5"/>
  <circle cx="1050" cy="62" r="1.5" fill="white" opacity="0.6"/>

  <!-- Back mountain range -->
  <polygon points="0,260 80,140 180,200 300,100 440,180 560,80 700,160 820,70 960,150 1080,90 1200,170 1200,480 0,480" fill="url(#mtn1)"/>

  <!-- Snow caps -->
  <polygon points="300,100 280,130 320,130" fill="white" opacity="0.6"/>
  <polygon points="560,80 540,115 580,115" fill="white" opacity="0.6"/>
  <polygon points="820,70 800,105 840,105" fill="white" opacity="0.6"/>
  <polygon points="1080,90 1060,125 1100,125" fill="white" opacity="0.6"/>

  <!-- Mid mountain range -->
  <polygon points="0,310 120,210 250,270 400,170 550,240 680,160 820,230 940,155 1080,210 1200,180 1200,480 0,480" fill="url(#mtn2)"/>

  <!-- Ground / base -->
  <rect x="0" y="380" width="1200" height="100" fill="url(#ground)"/>

  <!-- City buildings (silhouette) -->
  <!-- Far left cluster -->
  <rect x="30"  y="320" width="30" height="60" fill="#1a0e09"/>
  <rect x="70"  y="310" width="25" height="70" fill="#1a0e09"/>
  <rect x="105" y="330" width="20" height="50" fill="#1a0e09"/>

  <!-- Left mid cluster -->
  <rect x="180" y="295" width="28" height="85" fill="#1a0e09"/>
  <rect x="218" y="280" width="22" height="100" fill="#1a0e09"/>
  <rect x="250" y="305" width="18" height="75" fill="#1a0e09"/>
  <rect x="278" y="315" width="30" height="65" fill="#1a0e09"/>

  <!-- Center cluster (tallest — downtown SLC feel) -->
  <rect x="400" y="255" width="32" height="125" fill="url(#bldgA)"/>
  <rect x="442" y="235" width="28" height="145" fill="url(#bldgA)"/>
  <!-- Tall spire building -->
  <rect x="480" y="220" width="34" height="160" fill="#241008"/>
  <polygon points="480,220 497,190 514,220" fill="#2a1209"/>
  <rect x="524" y="240" width="30" height="140" fill="url(#bldgA)"/>
  <rect x="564" y="260" width="24" height="120" fill="url(#bldgA)"/>

  <!-- Center-right cluster -->
  <rect x="640" y="270" width="26" height="110" fill="#1a0e09"/>
  <rect x="676" y="255" width="30" height="125" fill="#1a0e09"/>
  <rect x="716" y="245" width="22" height="135" fill="#241008"/>
  <polygon points="716,245 727,218 738,245" fill="#2a1209"/>
  <rect x="748" y="265" width="28" height="115" fill="#1a0e09"/>

  <!-- Right cluster -->
  <rect x="840" y="300" width="25" height="80" fill="#1a0e09"/>
  <rect x="875" y="285" width="30" height="95" fill="#1a0e09"/>
  <rect x="915" y="295" width="22" height="85" fill="#1a0e09"/>
  <rect x="947" y="310" width="18" height="70" fill="#1a0e09"/>

  <!-- Far right cluster -->
  <rect x="1050" y="320" width="28" height="60" fill="#1a0e09"/>
  <rect x="1090" y="305" width="22" height="75" fill="#1a0e09"/>
  <rect x="1122" y="315" width="30" height="65" fill="#1a0e09"/>
  <rect x="1162" y="325" width="20" height="55" fill="#1a0e09"/>

  <!-- Building windows (warm glow) -->
  <rect x="488" y="230" width="4" height="5" fill="#f0a840" opacity="0.9"/>
  <rect x="496" y="230" width="4" height="5" fill="#f0a840" opacity="0.7"/>
  <rect x="488" y="242" width="4" height="5" fill="#f0a840" opacity="0.8"/>
  <rect x="496" y="242" width="4" height="5" fill="#f0a840" opacity="0.9"/>
  <rect x="488" y="254" width="4" height="5" fill="#f0a840" opacity="0.6"/>
  <rect x="496" y="254" width="4" height="5" fill="#f0a840" opacity="0.8"/>
  <rect x="450" y="245" width="4" height="5" fill="#f0a840" opacity="0.7"/>
  <rect x="458" y="245" width="4" height="5" fill="#f0a840" opacity="0.9"/>
  <rect x="450" y="258" width="4" height="5" fill="#f0a840" opacity="0.8"/>
  <rect x="724" y="255" width="4" height="5" fill="#f0a840" opacity="0.8"/>
  <rect x="732" y="255" width="4" height="5" fill="#f0a840" opacity="0.7"/>
  <rect x="724" y="268" width="4" height="5" fill="#f0a840" opacity="0.9"/>

  <!-- Subtle foreground haze -->
  <rect x="0" y="370" width="1200" height="30" fill="#1a0e09" opacity="0.5"/>
</svg>
