  <!-- Shopping bag icon -->
  <rect x="35" y="75" width="90" height="65" rx="6" fill="#4a7c20"/>
  <path d="M55 75 Q55 50 80 50 Q105 50 105 75" fill="none" stroke="#4a7c20" stroke-width="5"/>
  <line x1="55" y1="99" x2="125" y2="99" stroke="#fff" stroke-width="2"/>
