<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse — The Librarian's Shelf</title>
  <meta name="description" content="Browse every book reviewed on The Librarian's Shelf — filterable by spiritual wisdom, historical non-fiction, and science.">
  <meta name="author" content="Jin LaFrano">
  <meta property="og:title" content="Browse — The Librarian's Shelf">
  <meta property="og:description" content="Browse every book reviewed on The Librarian's Shelf — filterable by spiritual wisdom, historical non-fiction, and science.">
  <meta property="og:image" content="https://jinzurei.github.io/wdd231/project/images/covers/librarianimage02.webp">
  <meta property="og:url" content="https://jinzurei.github.io/wdd231/project/browse.html">
  <meta property="og:type" content="website">
  <link rel="icon" href="images/logo.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/browse.css">
</head>
<body>

  <!-- ── NAV ──────────────────────────────────────────────── -->
  <header class="site-header">
    <nav class="nav">
      <a href="index.html" class="nav-brand">
        <img src="images/logo.svg" class="nav-logo-img" alt="The Librarian's Shelf logo" width="44" height="44">
        The Librarian's Shelf
      </a>

      <button class="nav-toggle" id="navToggle"
              aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>

      <ul class="nav-links" id="navLinks" role="list">
        <li><a href="index.html">Home</a></li>
        <li><a href="browse.html" class="active">Browse</a></li>
        <li><a href="reading-list.html">Reading List</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <!-- ── PAGE HEADER ──────────────────────────────────────── -->
    <section class="browse-hero">
      <p class="browse-hero-label">The Complete Collection</p>
      <h1 class="browse-hero-title">Browse the Shelf</h1>
      <p class="browse-hero-sub">Every book the librarian has reviewed — across four territories of the mind.</p>
    </section>

    <!-- ── FILTER BAR ────────────────────────────────────────── -->
    <div class="filter-section">
      <div class="filter-bar" role="group" aria-label="Filter books by genre">
        <button class="filter-btn active" data-genre="all">All</button>
        <button class="filter-btn" data-genre="spiritual">Spiritual</button>
        <button class="filter-btn" data-genre="historical">Historical</button>
        <button class="filter-btn" data-genre="science">Science</button>
        <button class="filter-btn" data-genre="philosophy">Philosophy</button>
      </div>
      <p class="book-count" id="bookCount" aria-live="polite"></p>
    </div>

    <!-- ── BOOK GRID ─────────────────────────────────────────── -->
    <section class="browse-catalog" aria-labelledby="catalog-heading">
      <h2 id="catalog-heading" class="sr-only">Book catalog</h2>
      <div class="browse-grid" id="browseGrid"></div>
    </section>

  </main>

  <!-- ── FOOTER ─────────────────────────────────────────── -->
  <footer class="site-footer">
    <p>The Librarian's Shelf &mdash; Built with care for curious readers &mdash; WDD231</p>
  </footer>

  <script type="module" src="scripts/browse.js"></script>

</body>
</html>
