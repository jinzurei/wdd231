<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="An in-depth book review from The Librarian's Shelf.">

  <meta name="theme-color" content="#1b3a2d">
  <meta property="og:site_name" content="The Librarian's Shelf">
  <meta property="og:title" content="Review — The Librarian's Shelf">
  <meta property="og:description" content="An in-depth book review from The Librarian's Shelf.">
  <meta property="og:image" content="https://jinzurei.github.io/wdd231/project/images/covers/librarianimage02.webp">
  <meta property="og:url" content="https://jinzurei.github.io/wdd231/project/articles/article.html">
  <meta property="og:type" content="article">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Review — The Librarian's Shelf">
  <meta name="twitter:description" content="An in-depth book review from The Librarian's Shelf.">
  <meta name="twitter:image" content="https://jinzurei.github.io/wdd231/project/images/covers/librarianimage02.webp">
  <link rel="icon" href="../images/logo.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/article.css">
  <script type="module" src="../scripts/article.js"></script>
  <script defer src="../scripts/book-widget.js"></script>
</head>
<body>

  <div class="reading-progress-bar" id="readingProgressBar" aria-hidden="true"></div>

  <!-- ── NAV ──────────────────────────────────────────────── -->
  <header class="site-header">
    <nav class="nav">
      <a href="../index.html" class="nav-brand">
        <img src="../images/logo.svg" class="nav-logo-img" alt="The Librarian's Shelf logo" width="44" height="44">
        The Librarian's Shelf
      </a>

      <button class="nav-toggle" id="navToggle"
              aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>

      <ul class="nav-links" id="navLinks" role="list">
        <li><a href="../index.html">Home</a></li>
        <li><a href="../browse.html">Browse</a></li>
        <li><a href="../reading-list.html">Reading List</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <!-- ── HERO ─────────────────────────────────────────────── -->
    <section class="article-hero" id="articleHero" aria-labelledby="bookTitle">

      <div class="hero-inner">

        <!-- Book cover -->
        <div class="hero-cover-col">
          <div class="hero-book" id="heroCover">
            <div class="hero-book-spine"><span class="spine-label" id="heroSpineLabel" aria-hidden="true"></span></div>
            <div class="hero-book-face">
              <img class="hero-book-img" id="heroCoverImg" src="" alt="Book cover image">
            </div>
          </div>
        </div>

        <!-- Metadata -->
        <div class="hero-meta-col">
          <div class="hero-badges">
            <span class="hero-genre-badge" id="heroGenre"></span>
          </div>
          <h1 class="hero-title" id="bookTitle"></h1>
          <p class="hero-author" id="heroAuthor"></p>
          <p class="hero-date" id="heroDate"></p>
          <p class="hero-description" id="heroDesc"></p>
          <div class="hero-actions">
            <a class="btn-amazon" id="amazonLink" href="#" target="_blank" rel="noopener noreferrer">
              Find on Amazon &#x2197;
            </a>
            <button class="hero-save-btn" id="saveBtn" aria-label="Save to reading list">
              <span id="saveBtnIcon" aria-hidden="true">♡</span>
              <span id="saveBtnLabel">Save</span>
            </button>
          </div>
        </div>

      </div>

    </section>

    <!-- ── ARTICLE BODY ──────────────────────────────────────── -->
    <article class="article-body">

      <div class="article-back">
        <a href="../browse.html" class="back-link">&#x2190; Back to Browse</a>
      </div>

      <div class="article-content" id="articleContent">
        <!-- Populated by article.js -->
      </div>

    </article>

  </main>

  <!-- ── FOOTER ─────────────────────────────────────────── -->
  <footer class="site-footer">
    <p>The Librarian's Shelf &mdash; Built with care for curious readers &mdash; WDD231</p>
  </footer>


</body>
</html>
